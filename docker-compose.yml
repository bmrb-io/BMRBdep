services:
  bmrbig:
    build:
      context: .
    image: bmrbig
    container_name: bmrbig
    restart: always
    ports:
      - 9001:9001
    env_file:
      - .env
    user: "17473:10144"
    volumes:
      - /projects/BMRB/depositions/bmrbig/${ENVIRONMENT}:/opt/wsgi/depositions
      - /projects/BMRB/public/bmrbig/BackEnd/bmrbdep/configuration_${ENVIRONMENT}.json:/opt/wsgi/bmrbdep/configuration.json
