[uwsgi]
home = /opt/venv
uid = uwsgi
gid = uwsgi
module = bmrbdep
plugins = http,python3
# Bind the uwsgi protocol socket to loopback only. With network_mode: host this is the
# host's 127.0.0.1:9000, which is exactly where nginx connects (uwsgi_pass 127.0.0.1:9000).
# Binding to all interfaces (:9000) would expose the uwsgi protocol — which lets the caller
# set arbitrary request params, including REMOTE_ADDR — to anything that can reach port 9000.
socket = 127.0.0.1:9000
#http = :9001
master = true
cheaper = 1
workers = 10
http-timeout = 3600
socket-timeout = 3600
# These fix the path issue
#route-run = setpathinfo:${SCRIPT_NAME}${PATH_INFO}
#route-run = setscriptname:
